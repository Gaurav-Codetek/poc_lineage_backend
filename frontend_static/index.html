    <script>
      (() => {
        const legacyOrigin = "https://poc-lineage-backend.vercel.app";
        const apiPrefixes = ["/lineage/", "/refresh/", "/retriever/", "/stats/", "/health/", "/dq/"];
        const originalFetch = window.fetch.bind(window);

        const rewriteUrl = (value) => {
          const source = typeof value === "string" ? value : value.url;

          try {
            const url = new URL(source, window.location.origin);
            const shouldRewriteOrigin = url.origin === legacyOrigin || url.origin === window.location.origin;
            const shouldRewritePath = apiPrefixes.some((prefix) => url.pathname.startsWith(prefix));

            if (shouldRewriteOrigin && shouldRewritePath) {
              url.protocol = window.location.protocol;
              url.host = window.location.host;
              url.pathname = `/api${url.pathname}`;
              return url.toString();
            }
          } catch (error) {
            console.error("Failed to rewrite frontend API request", error);
          }

          return source;
        };

        window.fetch = (input, init) => {
          const rewritten = rewriteUrl(input);

          if (input instanceof Request) {
            return originalFetch(new Request(rewritten, input), init);
          }

          return originalFetch(rewritten, init);
        };
      })();
    </script>
